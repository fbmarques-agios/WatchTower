; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .
default_envs = m5stickc_plus

; Configuracao comum a todas as placas ESP32 (plataforma + bibliotecas)
[esp32_base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<.git/> -<test/>

lib_deps =
    tzapu/WiFiManager@2.0.17
    adafruit/Adafruit NeoPixel@1.15
    bblanchon/ArduinoJson@7.4.2
    ; s00500/ESPUI@2.2.4
    https://github.com/emmby/ESPUI#feature-setCustomCSS
    ESP32Async/ESPAsyncWebServer@3.9.2
    ESP32Async/AsyncTCP@3.4.9
    arduino-libraries/ArduinoMDNS@1.0.1

; Ignore native tests on the embedded platform as they use mocks incompatible with the hardware
test_ignore = test_native

; Placa original do projeto (Adafruit QT Py ESP32, flash 8MB)
[env:adafruit_qtpy_esp32]
extends = esp32_base
board = adafruit_qtpy_esp32
board_build.partitions = default_8MB.csv

; M5StickC Plus 1.1 -- ESP32-PICO-D4, flash de 4MB.
; O board "m5stick-c" aponta para a variante "m5stick_c", que nao existe no
; core arduino-esp32 3.x; forcamos a variante correta "m5stack_stickc_plus".
; Usa huge_app.csv (3MB de app, sem OTA) porque ESPUI + AsyncWebServer
; nao cabem com folga na tabela de particao padrao de 4MB.
[env:m5stickc_plus]
extends = esp32_base
board = m5stick-c
board_build.variant = m5stack_stickc_plus
board_build.partitions = huge_app.csv
; M5Unified (+ M5GFX) so para o M5StickC Plus: liga o LCD e o backlight (AXP192)
lib_deps =
    ${esp32_base.lib_deps}
    m5stack/M5Unified

[env:native]
platform = native
test_framework = unity
build_flags =
    -D UNIT_TEST
    -I test/mocks
lib_deps = throwtheswitch/Unity@^2.5.2
build_src_filter = -<*> +<test/test_native/>
